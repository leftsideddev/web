[build]
  command = "npm run build"
  publish = "dist"
  functions = "functions"

# Handle SPA routing: redirect all requests to index.html
# This allows React Router to handle the URL paths directly.
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200